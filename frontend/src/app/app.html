<div class="shell">
  <header class="topbar">
    <a class="brand" routerLink="/groups">StudySync</a>

    <nav class="nav">
      @if (currentUser(); as user) {
        <a class="nav__link" routerLink="/groups" routerLinkActive="nav__link--active">Groups</a>
        <a class="nav__link" routerLink="/groups/new" routerLinkActive="nav__link--active">Create Group</a>
        <span class="nav__user">{{ user.username }}</span>
        <button class="nav__button" type="button" (click)="logout()">Logout</button>
      } @else {
        <a class="nav__link" routerLink="/login" routerLinkActive="nav__link--active">Login</a>
      }
    </nav>
  </header>

  <main class="content">
    <router-outlet />
  </main>
</div>
